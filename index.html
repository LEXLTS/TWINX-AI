<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TWINX AI</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app-container">

    <!-- Header -->

    <header class="top-bar">

        <div class="logo-box">

            <div class="logo">
                ⚡
            </div>

        </div>

        <div class="title-box">

            <h1>TWINX AI</h1>

            <p id="statusText">
                🟢 Online
            </p>

        </div>

        <button class="menu-btn">
            ☰
        </button>

    </header>

    <!-- Chat Area -->

    <main id="chatBox" class="chat-box">

        <div class="ai-message">

            <strong>TWINX AI</strong>

            <br><br>

            👋 Welcome back!

            <br><br>

            I'm ready to help you today.

            <br><br>

            Ask me anything.

        </div>

    </main>

    <!-- Input Area -->

    <div class="input-area">

        <button class="attach-btn">
            📎
        </button>

        <input
        type="text"
        id="userInput"
        placeholder="Message TWINX AI...">

        <button
        id="voiceBtn">
            🎤
        </button>

        <button
        id="sendBtn">
            ➤
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
